trigger: none

pool:
  vmImage: Default

variables:
  system.debug: false   # optional → disables noisy logs

steps:
# Explicit checkout (good practice)
- checkout: self

# Azure Key Vault task
- task: AzureKeyVault@2
  inputs:
    azureSubscription: 'Azure subscription 1(c38610e8-76c1-4e24-88af-7f225c0da027)'
    KeyVaultName: 'test-3r3g'
    SecretsFilter: '*'
    RunAsPreJob: true

# Use bash instead of CmdLine (recommended on Linux agents)
- script: |
    echo "Testing the key vault access"
    echo "Secret value is: $(test)"